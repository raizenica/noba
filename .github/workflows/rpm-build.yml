name: Build RPM Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: dnf install -y rpm-build rpmdevtools

      - name: Setup RPM build tree
        run: rpmdev-setuptree

      - name: Create source tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Default to spec version for workflow_dispatch
          [ -z "$VERSION" ] && VERSION=$(grep '^Version:' noba.spec | awk '{print $2}')
          mkdir -p noba-${VERSION}
          cp -r bin libexec share scripts install.sh noba.spec \
                README.md LICENSE CHANGELOG.md CONTRIBUTING.md \
                noba-${VERSION}/
          tar -czf ~/rpmbuild/SOURCES/noba-${VERSION}.tar.gz noba-${VERSION}

      - name: Build RPM
        run: rpmbuild -ba noba.spec

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: noba-rpm
          path: ~/rpmbuild/RPMS/

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ~/rpmbuild/RPMS/noarch/*.rpm
