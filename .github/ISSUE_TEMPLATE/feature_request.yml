name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your use case clearly so we can understand the need.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and this feature has not been requested before
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Dashboard UI / Cards
        - New Integration (Pi-hole, TrueNAS, Plex, etc.)
        - Alerting & Notifications
        - Automation / Scripts
        - Security (auth, 2FA, sessions)
        - Deployment (Docker, Kubernetes, install)
        - Performance / Scalability
        - Developer Experience (API, plugins, testing)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What problem does this feature solve? What are you trying to do?
      placeholder: "I often need to... but currently I have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see. How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would significantly improve my workflow
        - Blocking my use of NOBA
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be willing to submit a pull request for this feature

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Mockups, links to similar features in other projects, or any other context.
